
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    width:1080px;
    height:1920px;
    background:transparent;
}

.cta{

    position:absolute;

    left:40px;
    right:40px;

    bottom:80px;

    background:rgba(0,0,0,.88);

    border-radius:40px;

    padding:50px;

    color:white;

    box-shadow:0 20px 60px rgba(0,0,0,.5);

}

.titulo{

    font-size:82px;

    font-weight:900;

    line-height:1.05;

    text-align:center;

}

.sub{

    margin-top:20px;

    font-size:42px;

    color:#ffffff;

    font-weight:700;

    text-align:center;

}

.lista{

    margin-top:30px;

    font-size:48px;

    line-height:1.6;

}

.link{

    margin-top:35px;

    font-size:64px;

    font-weight:900;

    color:#7fd3ff;

    text-align:center;

}

.badge{

    position:absolute;

    top:60px;

    left:40px;

    background:#00c853;

    color:white;

    font-size:42px;

    font-weight:900;

    padding:18px 30px;

    border-radius:18px;

    box-shadow:0 10px 30px rgba(0,0,0,.4);

}

</style>
</head>
<body>

<div class="badge">
⚡ IA EN VIVO
</div>

<div class="cta">

<div class="titulo">
🇺🇸 TEACHER LILY
</div>

<div class="sub">
Preguntale cualquier cosa en inglés
</div>

<div class="lista">
✅ Gratis<br>
✅ Sin registro<br>
✅ Respuesta inmediata<br>
✅ Sin límites
</div>

<div class="link">
👇 LINK EN COMENTARIOS
</div>

</div>

</body>
</html>
